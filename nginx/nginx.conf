upstream gpiv_app {
    server web:8000;
}

# GPIV
server {
    listen 80;
    server_name gpiv.tivena.com.ar;

    location /static/ {
        alias /app/staticfiles/;
    }

    location / {
        proxy_pass http://gpiv_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# Landing
server {
    listen 80;
    server_name tivena.com.ar;
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}

